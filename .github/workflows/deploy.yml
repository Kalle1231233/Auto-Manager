name: Deploy VehicleHub to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: VehicleHub/package-lock.json

      - name: Install dependencies
        working-directory: VehicleHub
        run: npm ci

      - name: Build Expo web app
        working-directory: VehicleHub
        run: npx expo export --platform web

      - name: Copy build to docs
        run: |
          rm -rf docs
          cp -r VehicleHub/dist docs
          touch docs/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
